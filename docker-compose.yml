services:
  enn-magazine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enn-magazine
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=production
      # ⚠️  Change this — use a long random string in production
      # Generate: node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production}
      - PORT=5174
    volumes:
      # SQLite database — persists across rebuilds and restarts
      - enn_data:/app/data
      # Uploaded magazine covers and PDFs
      - enn_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5174/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  enn_data:
    driver: local
  enn_uploads:
    driver: local
